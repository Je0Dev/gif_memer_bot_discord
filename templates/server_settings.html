{% extends "base.html" %}
{% block title %}Server Settings - Meme Bot{% endblock %}
{% block content %}
<div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
    <a href="/servers" class="btn btn-secondary">← Back</a>
    <h1>⚙️ {{ server_name }}</h1>
</div>

<div class="card">
    <h2 style="margin-bottom: 1.5rem; color: var(--primary);">📅 Daily Memes</h2>
    <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <label style="display: flex; align-items: flex-start; gap: 1rem; cursor: pointer;">
            <input type="checkbox" name="daily_memes" {% if settings and settings.get('daily_memes') %}checked{% endif %} 
                   style="width: 24px; height: 24px; accent-color: var(--primary); margin-top: 0.25rem;">
            <div>
                <h3 style="margin-bottom: 0.25rem;">Enable Daily Memes</h3>
                <p style="color: var(--muted); font-size: 0.9rem;">Receive a random meme every day at 12:00 PM UTC</p>
            </div>
        </label>
    </form>
</div>

<div class="card">
    <h2 style="margin-bottom: 1.5rem; color: var(--secondary);">📺 Target Channel</h2>
    <form method="POST">
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <label>
                <p style="margin-bottom: 0.5rem; color: var(--muted);">Select a text channel for daily memes</p>
                <select name="target_channel">
                    <option value="">📭 No channel selected</option>
                    {% for channel in channels %}
                    <option value="{{ channel.id }}" {% if settings and settings.get('target_channel_id') == channel.id %}selected{% endif %}>
                        #{{ channel.name }}
                    </option>
                    {% endfor %}
                </select>
            </label>
            <button type="submit" class="btn btn-primary">💾 Save Settings</button>
        </div>
    </form>
</div>

<div class="card">
    <h2 style="margin-bottom: 1rem;">💡 Quick Commands</h2>
    <p style="color: var(--muted); margin-bottom: 1rem;">Try these in your Discord server:</p>
    <div style="background: rgba(0,0,0,0.3); padding: 1.25rem; border-radius: 12px; font-family: monospace;">
        <p style="color: var(--primary);">/meme</p>
        <p style="color: var(--secondary);">/gif happy</p>
        <p style="color: var(--accent);">/dankmemes</p>
        <p style="color: var(--primary);">/wholesome</p>
        <p style="color: var(--secondary);">/trending</p>
        <p style="color: var(--accent);">/random</p>
    </div>
</div>
{% endblock %}
