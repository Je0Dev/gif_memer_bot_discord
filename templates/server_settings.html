{% extends "base.html" %}
{% block title %}Server Settings{% endblock %}
{% block content %}
<h1>Settings for Server</h1>
<form method="POST">
    <div class="form-group">
        <label for="daily_memes">
            <input type="checkbox" id="daily_memes" name="daily_memes" {% if settings.daily_memes %}checked{% endif %}>
            Enable Daily Memes
        </label>
    </div>
    <div class="form-group">
        <label for="target_channel">Target Channel</label>
        <select id="target_channel" name="target_channel">
            <option value="">None</option>
            {% for channel in channels %}
            <option value="{{ channel.id }}" {% if settings.target_channel_id == channel.id %}selected{% endif %}>
                #{{ channel.name }}
            </option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn">Save Settings</button>
</form>
{% endblock %}
